{% extends "base.html" %}
{% load static %}
{% block title %}Dashboard — Moneta{% endblock %}

{% block content %}
<style>
    .debug-panel {
        position: fixed;
        bottom: 24px;
        left: 24px;
        background: #f0f0f0;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        font-size: 0.75rem;
        font-family: monospace;
        max-width: 300px;
        z-index: 999;
        max-height: 200px;
        overflow-y: auto;
        display: none;
    }

    .debug-panel.show {
        display: block;
    }

    .debug-panel-toggle {
        position: fixed;
        bottom: 24px;
        left: 24px;
        background: #3b5bdb;
        color: white;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 998;
    }

    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1000px;
        margin: 44px auto 0;
        padding: 0 24px;
    }

    .page-header h1 {
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -.5px;
    }

    .page-header p {
        color: #a0a0a0;
        font-size: .9rem;
        margin-top: 3px;
    }

    .container {
        max-width: 1000px;
        margin: 24px auto 52px;
        padding: 0 24px;
    }

    .portfolios-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 18px;
    }

    .portfolio-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, .06);
        padding: 26px 24px;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        border: 1.5px solid transparent;
        transition: border-color .18s, box-shadow .18s, transform .12s;
        display: block;
    }

    .portfolio-card:hover {
        border-color: #3b5bdb;
        box-shadow: 0 4px 24px rgba(59, 91, 219, .12);
        transform: translateY(-2px);
    }

    .portfolio-card-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
    }

    .portfolio-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: #e8eeff;
        color: #3b5bdb;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: .95rem;
        font-weight: 800;
        flex-shrink: 0;
    }

    .portfolio-card-name {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 2px;
        color: #1a1a1a;
    }

    .portfolio-card-date {
        font-size: .78rem;
        color: #b0b0b0;
    }

    .portfolio-card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 14px;
        border-top: 1px solid #f3f4f6;
    }

    .portfolio-card-footer span {
        font-size: .82rem;
        color: #9ca3af;
    }

    .portfolio-card-arrow {
        color: #3b5bdb !important;
        font-weight: 700;
        font-size: .88rem;
    }

    .empty-state {
        grid-column: 1/-1;
        text-align: center;
        padding: 64px 20px;
    }

    .empty-state p:first-child {
        font-size: 1rem;
        font-weight: 700;
        color: #555;
        margin-bottom: 6px;
    }

    .empty-state p {
        color: #b0b0b0;
        font-size: .9rem;
    }

    .loading {
        grid-column: 1/-1;
        text-align: center;
        padding: 48px;
        color: #b0b0b0;
        font-size: .9rem;
    }

    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .3);
        backdrop-filter: blur(3px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .modal.show {
        display: flex;
    }

    .modal-content {
        background: #fff;
        border-radius: 20px;
        padding: 40px 38px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 8px 48px rgba(0, 0, 0, .14);
        position: relative;
        animation: slideUp .2s ease;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(12px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .modal-content h2 {
        font-size: 1.3rem;
        font-weight: 800;
        margin-bottom: 22px;
        letter-spacing: -.4px;
    }

    .close {
        position: absolute;
        top: 16px;
        right: 20px;
        font-size: 1.4rem;
        cursor: pointer;
        color: #c0c0c0;
        background: none;
        border: none;
        line-height: 1;
        transition: color .15s;
    }

    .close:hover {
        color: #1a1a1a;
    }

    .notification {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 13px 20px;
        border-radius: 12px;
        font-size: .88rem;
        font-weight: 600;
        box-shadow: 0 4px 20px rgba(0, 0, 0, .12);
        z-index: 2000;
        animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(6px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .notification.error {
        background: #fee2e2;
        color: #b91c1c;
        border: 1px solid #fca5a5;
    }

    .notification.success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #86efac;
    }

    /* CONSULTA TICKER */
    .ticker-search {
        background: linear-gradient(135deg, #f0f5ff 0%, #f8faff 100%);
        border-radius: 16px;
        padding: 28px 24px;
        margin-top: 0;
        border: 1.5px solid #e0e8ff;
    }

    .ticker-search h3 {
        font-size: .95rem;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 16px;
    }

    .ticker-search-form {
        display: flex;
        gap: 12px;
        align-items: flex-end;
    }

    .ticker-search-form .form-group {
        flex: 1;
        margin: 0;
    }

    .ticker-search-form label {
        display: block;
        font-size: .78rem;
        font-weight: 700;
        color: #b0b0b0;
        text-transform: uppercase;
        letter-spacing: .5px;
        margin-bottom: 6px;
    }

    .ticker-search-form input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid #d8e0ff;
        border-radius: 10px;
        font-size: .9rem;
        font-family: 'DM Sans', sans-serif;
        transition: border-color .15s;
    }

    .ticker-search-form input:focus {
        outline: none;
        border-color: #3b5bdb;
        background: #fff;
    }

    .ticker-search-form button {
        padding: 10px 20px;
        height: 42px;
    }
</style>

<div class="page-header">
    <div>
        <h1>Meus Portfólios</h1>
        <p id="portfolio-count">Carregando...</p>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openCreatePortfolioModal()">+ Novo Portfólio</button>
</div>

<div class="container">
    <div class="ticker-search">
        <h3>Consultar Ticker</h3>
        <form class="ticker-search-form" onsubmit="handleTickerSearch(event)">
            <div class="form-group">
                <label for="ticker-search-input">Ticker (Ação, ETF, FII)</label>
                <input type="text" id="ticker-search-input" placeholder="Ex: PETR4, ITUB4, VALE3" required
                    style="text-transform:uppercase;">
            </div>
            <button type="submit" class="btn btn-primary btn-sm">Consultar</button>
        </form>
    </div>

    <div id="portfolios-grid" class="portfolios-grid" style="margin-top: 32px;">
        <div class="loading">Carregando portfólios...</div>
    </div>
</div>

<div id="createPortfolioModal" class="modal" style="display:none;">
    <div class="modal-content">
        <span class="close" onclick="closeCreatePortfolioModal()">&times;</span>
        <h2>Novo Portfólio</h2>
        <form onsubmit="handleCreatePortfolio(event)">
            <div class="form-group">
                <label for="portfolio-name-input">Nome do portfólio</label>
                <input type="text" id="portfolio-name-input" name="name" placeholder="Ex: Portfólio Longo Prazo"
                    required>
            </div>
            <button type="submit" class="btn btn-primary">Criar portfólio</button>
            <button type="button" class="btn btn-outline" onclick="closeCreatePortfolioModal()"
                style="margin-top:8px;">Cancelar</button>
        </form>
    </div>
</div>

<!-- Modal: Detalhes do Ticker / Consulta -->
<div id="tickerDetailsModal" class="modal"
    onclick="if(event.target.id==='tickerDetailsModal') closeTickerDetailsModal()">
    <div class="modal-content">
        <button class="close" onclick="closeTickerDetailsModal()">✕</button>
        <div id="tickerDetailsContent"></div>
    </div>
</div>

<!-- Debug Panel -->
<button class="debug-panel-toggle" onclick="toggleDebugPanel()" title="Modo Debug">🔧</button>
<div id="debugPanel" class="debug-panel">
    <div><strong>Debug Moneta</strong></div>
    <div id="debugContent">Carregando...</div>
</div>

<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/dashboard.js' %}"></script>
<script>
    function toggleDebugPanel() {
        const panel = document.getElementById('debugPanel');
        panel.classList.toggle('show');
        if (panel.classList.contains('show')) {
            updateDebugPanel();
        }
    }

    function updateDebugPanel() {
        const debug = typeof debugMoneta === 'function' ? debugMoneta() : {};
        document.getElementById('debugContent').innerHTML = `
        <div><strong>Token:</strong> ${debug.hasToken ? '✓ Sim' : '✗ Não'}</div>
        <div><strong>Token prévia:</strong> ${debug.token || 'nulo'}</div>
        <div><strong>localStorage:</strong> access=${debug.localStorage?.access_token ? '✓' : '✗'}, refresh=${debug.localStorage?.refresh_token ? '✓' : '✗'}</div>
        <div><strong>Último erro:</strong> ${debug.lastError || 'nenhum'}</div>
        <div style="margin-top: 8px; font-size: 0.7rem; color: #666;">
            Dica: Veja o console (F12) para logs detalhados com tags [API], [DASHBOARD], [CREATE]
        </div>
    `;
        setTimeout(updateDebugPanel, 2000); // Atualiza a cada 2s
    }
</script>
{% endblock %}
